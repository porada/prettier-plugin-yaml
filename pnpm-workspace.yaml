autoInstallPeers: false

minimumReleaseAgeExclude:
  - prettier

overrides:
  vite-plus>oxfmt: '-'

peerDependencyRules:
  allowAny:
    - '@vitest/coverage-v8'
    - vitest

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - ast-v8-to-istanbul@1.0.2
  - tinyexec@1.2.2
