autoInstallPeers: false

color: always

gitChecks: false

minimumReleaseAgeExclude:
  - '@prettier/*'
  - '@standard-config/*'
  - prettier

overrides:
  vite-plus>oxfmt: '-'
  vite-plus>oxlint: latest
  vite-plus>oxlint-tsgolint: latest

peerDependencyRules:
  allowAny:
    - '@vitest/coverage-v8'

strictPeerDependencies: true

trustPolicy: no-downgrade
