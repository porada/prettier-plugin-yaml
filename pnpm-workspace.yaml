autoInstallPeers: false

catalog:
  oxlint: ^1.70.0

color: always

gitChecks: false

minimumReleaseAgeExclude:
  - prettier

overrides:
  vite-plus>oxfmt: '-'
  vite-plus>oxlint: 'catalog:'

peerDependencyRules:
  allowAny:
    - '@vitest/coverage-v8'
    - vitest

strictPeerDependencies: true

trustPolicy: no-downgrade
